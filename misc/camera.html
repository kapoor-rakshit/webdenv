<!-- 
REFERENCE
https://developer.mozilla.org/en-US/docs/Web/API/Media_Capture_and_Streams_API/Taking_still_photos
https://www.digitalocean.com/community/tutorials/front-and-rear-camera-access-with-javascripts-getusermedia
-->

<html>
  <head>
    <title>Open Device Camera</title>
    <script defer="true">
      const width = 320; // We will scale the photo width to this
      let height = 0;    // This will be computed based on the input stream

      let streaming = false;

      function openCamera() {
        navigator.mediaDevices
          .getUserMedia({
            video: { facingMode: { exact: "user" } }, // Use "environment" for REAR camera | "user" for FRONT camera
            audio: false,
          })
          .then((stream) => {
            const video = document.getElementById("video");
            const canvas = document.getElementById("canvas");
            const photo = document.getElementById("photo");

            video.addEventListener("canplay", (ev) => {
              if (!streaming) {
                height = video.videoHeight / (video.videoWidth / width);

                video.setAttribute("width", width);
                video.setAttribute("height", height);
                canvas.setAttribute("width", width);
                canvas.setAttribute("height", height);
                streaming = true;
              }
            });

            video.srcObject = stream;
            video.play();
          })
          .catch((err) => {
            console.error(`An error occurred: ${err}`);
          });
      }

      function takePhoto() {
        const context = canvas.getContext("2d");
        if (width && height) {
          canvas.width = width;
          canvas.height = height;
          context.drawImage(video, 0, 0, width, height);

          const data = canvas.toDataURL("image/png");
          photo.setAttribute("src", data);
        } else {
          clearPhoto();
        }
      }

      function clearPhoto() {
        const context = canvas.getContext("2d");
        context.fillStyle = "#aaaaaa";
        context.fillRect(0, 0, canvas.width, canvas.height);

        const data = canvas.toDataURL("image/png");
        photo.setAttribute("src", data);
      }
    </script>
  </head>
  <body>
    <button type="button" onclick="openCamera()">Open Camera</button>

    <div>
      <video id="video">Video stream not available.</video>
      <button type="button" onclick="takePhoto()">Capture photo</button>
    </div>

    <canvas id="canvas" hidden="true"></canvas>
    <div class="output">
      <img
        id="photo"
        src=""
        alt="The screen capture will appear in this box."
      />
    </div>
  </body>
</html>
